quarkus.mongodb.connection-string=${MONGODB_URI}
quarkus.mongodb.database=library

# ReadPreference: primary | primaryPreferred | secondary | secondaryPreferred | nearest
mongodb.read-preference=primary

# Connection Pool
mongodb.pool.max-size=100
mongodb.pool.min-size=0
mongodb.pool.max-connection-idle-time-ms=0
mongodb.pool.max-connection-life-time-ms=0

# CSOT - Client-Side Operation Timeout (ms). 0 = disabled (driver default).
# Replaces the deprecated waitQueueTimeoutMS. Covers server selection + checkout + execution.
mongodb.timeout-ms=0

# --- Simulation profile (pool exhaustion / timeout) ---
# Activate with: QUARKUS_PROFILE=simulation or -Dquarkus.profile=simulation
%simulation.mongodb.pool.max-size=2
%simulation.mongodb.pool.min-size=0
%simulation.mongodb.timeout-ms=500
